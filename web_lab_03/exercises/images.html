<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>
<style>
  img { margin: 10px; transition: 0.3s; }
  .rounded { border-radius: 15px; }
  .circle { border-radius: 50%; border: 2px solid #3498db; }
  .hover-effect:hover { transform: scale(1.05); }
</style>
</head>
<body>

<h1>Image Gallery</h1>

<img src="../images/Bab-e-khyber.jpg" class="rounded" alt="Bab-e-Khyber">
<img src="../images/circle.jpg" class="circle" alt="Circle">
<img src="../images/natural.jpg" class="hover-effect" alt="Natural">

</body>
</html>
